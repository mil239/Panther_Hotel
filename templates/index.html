{% extends "base.html" %}
{% block title %} Welcome - Panther Hotel {% endblock %}

{% block content %}
<section class = "Welcome_section">
    <div class = "welcome_bg">
        <div class = "hero_orb hero_orb_1"></div>
        <div class = "hero_orb hero_orb_2"></div>
        <div class = "hero_grid"></div>
    </div>
    <div class = "welcome_content">
        <span class = "welcome_eyebrow"> New York City · Est. 2019 </span>
        <div class = "welcome_diamond"> ◆ </div>
        <h1 class = "welcome_heading"> Welcome to the <br><span class = "welcome_accent"> Panther Hotel</span></h1>
        <p class = "welcome_sub"> A sanctuary for those who perfer the night. <br> Obsidian luxury in the heart of Manhattan. </p>
        <div class = "welcome_buttons">
            <a href = "/reservation" class = "btn_primary btn_large"> Book a Room </a>
            <a href = "/manager" class = "btn_ghost btn_large"> Manager </a>
        </div>
    </div>
</section>
{% endblock %}
