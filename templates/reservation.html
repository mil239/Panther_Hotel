{% extends "base.html" %}
{% block title %}Book a Room — Panther Hotel{% endblock %}

{% block content %}
<section class="page-hero">
    <div class="welcome-bg">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-grid"></div>
    </div>
    <div class="page-hero-content">
        <span class="welcome-eyebrow">Accommodations</span>
        <h1 class="page-title">Make a Reservation</h1>
    </div>
</section>

<section class="reservation-section">
    <div class="res-card">
        <form id="reservationForm" onsubmit="submitReservation(event)">
            <div class="form-group">
                <label for="guestName">Full Name</label>
                <input type="text" id="guestName" placeholder="e.g. Jane Smith" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="checkIn">Check-In Date</label>
                    <input type="date" id="checkIn" required>
                </div>
                <div class="form-group">
                    <label for="checkOut">Check-Out Date</label>
                    <input type="date" id="checkOut" required>
                </div>
            </div>

            <div class="form-group">
                <label for="roomType">Room Type</label>
                <select id="roomType" required>
                    <option value="" disabled selected>Select a room</option>
                    {% for room in rooms %}
                    <option value="{{ room.name }} — {{ room.type|capitalize }} (${{ room.price }}/night)">
                        {{ room.name }} — {{ room.type|capitalize }} · ${{ room.price }}/night · {{ room.size }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div id="formError" class="form-error" style="display:none;"></div>

            <div class="form-actions">
                <a href="/" class="btn-ghost">← Back</a>
                <button type="submit" class="btn-primary">Confirm Reservation →</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById('checkIn').min = today;
document.getElementById('checkOut').min = today;
document.getElementById('checkIn').addEventListener('change', function() {
    document.getElementById('checkOut').min = this.value;
});

async function submitReservation(e) {
    e.preventDefault();
    const name     = document.getElementById('guestName').value.trim();
    const checkIn  = document.getElementById('checkIn').value;
    const checkOut = document.getElementById('checkOut').value;
    const roomType = document.getElementById('roomType').value;
    const errEl    = document.getElementById('formError');

    if (new Date(checkOut) <= new Date(checkIn)) {
        errEl.textContent = 'Check-out must be after check-in.';
        errEl.style.display = 'block';
        return;
    }
    errEl.style.display = 'none';

    const res = await fetch('/api/reserve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guest_name: name, check_in: checkIn, check_out: checkOut, room_type: roomType })
    });
    const data = await res.json();
    if (res.ok) {
        window.location.href = `/confirmation/${data.id}`;
    } else {
        errEl.textContent = data.error || 'Something went wrong.';
        errEl.style.display = 'block';
    }
}
</script>
{% endblock %}
